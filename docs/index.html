<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0c">
<!-- Defense-in-depth: restrict images to same-origin + data: URIs so an agent-authored
     SVG/image log entry (rendered via <img>) can't passively phone home to an external
     URL. Only img-src is constrained — script/wasm/style/connect stay unrestricted so
     the inline module, the blob-imported live UI, the wasm, and the iroh transport keep
     working. The auth token still can't leak (no script sink reaches agent content). -->
<meta http-equiv="Content-Security-Policy" content="img-src 'self' data:">
<title>botq</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0b0b0c; color: #e6e6e6;
    font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    padding: max(env(safe-area-inset-top), 12px) 12px calc(env(safe-area-inset-bottom) + 12px);
    -webkit-text-size-adjust: 100%;
  }
  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .5px; }
  #status { color: #9a9a9a; font-size: 12px; }
  #status.ok { color: #5ec27a; }
  #status.err { color: #e0584e; }
  #gate { display: grid; gap: 8px; max-width: 640px; }
  textarea {
    width: 100%; min-height: 76px; resize: vertical;
    background: #141416; color: #e6e6e6; border: 1px solid #2a2a2e;
    border-radius: 6px; padding: 10px; font: inherit;
  }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button {
    background: #1d1d20; color: #e6e6e6; border: 1px solid #34343a;
    border-radius: 6px; padding: 10px 14px; font: inherit; cursor: pointer;
    min-height: 40px;            /* comfortable touch target */
  }
  button:hover { background: #26262b; }
  button.primary { border-color: #3a5; }
  #saved-note { color: #9a9a9a; align-self: center; margin-right: 4px; }
  #app { margin-top: 6px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>botq</h1>
  <span id="status">paste token to connect</span>
</header>

<!-- Token entry. Once a token is saved we NEVER render it back into the DOM (it
     embeds the auth secret) — the input is hidden and #saved shows instead. -->
<div id="gate">
  <textarea id="token" placeholder="paste your `botq dash-token` here" autocomplete="off" spellcheck="false" inputmode="text"></textarea>
  <div class="row">
    <button id="connect" class="primary">Connect</button>
  </div>
</div>

<div id="saved" class="row hidden">
  <span id="saved-note">🔒 token saved on this device</span>
  <button id="reenter">Use a different token</button>
  <button id="forget">Forget token</button>
</div>

<div id="app"></div>

<script type="module">
import wbgInit, { init as wasmInit, connect, send, recv, send_only } from './botq_dash_wasm.js';

const KEY = 'botq.token';
const $ = (id) => document.getElementById(id);
const enc = new TextEncoder();
const dec = new TextDecoder();

function setStatus(msg, cls) {
  const s = $('status');
  s.textContent = msg;
  s.className = cls || '';
}

// Show either the token input (no saved token) or the saved-state row (token on
// file) — never both. The token VALUE is never put back in the DOM once saved.
function showSavedState(saved) {
  $('gate').classList.toggle('hidden', saved);
  $('saved').classList.toggle('hidden', !saved);
}

// base64url (no padding) <-> bytes/text. The wasm wrapper speaks raw bytes; all
// JSON framing is assembled here.
function b64urlToBytes(s) {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  const bin = atob(s);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
const b64urlToText = (s) => dec.decode(b64urlToBytes(s));
const jsonBytes = (obj) => enc.encode(JSON.stringify(obj));
const parse = (bytes) => JSON.parse(dec.decode(bytes));

// The connection plumbing. `request` is one send→recv round-trip; `subscribe`
// issues `sub_<kind>` then streams every pushed frame to `cb` (first the snapshot,
// then deltas). A subscription owns the recv stream, so `request` and `subscribe`
// must not overlap — the bootstrap does all its `request` calls (auth, get_ui)
// BEFORE handing the UI a subscribe-ONLY handle (see below), which makes that
// invariant structural rather than a thing the UI has to remember.
const conn = {
  async request(obj) { return parse(await send(jsonBytes(obj))); },
  async subscribe(kind, cb) {
    cb(parse(await send(jsonBytes({ op: `sub_${kind}` }))));
    for (;;) cb(parse(await recv()));
  },
  // A fire-and-forget WRITE: writes on the send half only and awaits NO reply, so it
  // is safe to call WHILE subscribed — it never races the subscription's recv loop
  // (the footgun `request` would hit). This is the owner→server write channel the UI
  // uses for `send_triage` / `instruct`. Resolves once the bytes are flushed; a
  // transport failure rejects.
  async sendOnly(obj) { await send_only(jsonBytes(obj)); },
};

async function start(token) {
  setStatus('decoding token…');
  let t;
  try { t = JSON.parse(b64urlToText(token.trim())); }
  catch { return setStatus('token is not valid base64url JSON', 'err'); }
  if (!t.endpoint_id || !t.secret) return setStatus('token missing endpoint_id/secret', 'err');

  try {
    setStatus('loading wasm…');
    await wbgInit();
    wasmInit();

    setStatus('connecting over iroh…');
    const target = t.relay_url ? `${t.endpoint_id}@${t.relay_url}` : t.endpoint_id;
    await connect(target);

    setStatus('authenticating…');
    const authResp = await conn.request({ auth: t.secret });
    if (!authResp.ok) return setStatus('auth rejected — wrong secret', 'err');

    // Auth OK → persist the token, then scrub it from the DOM and switch to the
    // saved-state UI so the secret is never displayed again (owner request).
    localStorage.setItem(KEY, token.trim());
    $('token').value = '';
    showSavedState(true);

    setStatus('loading dashboard…');
    const { ui_b64 } = await conn.request({ op: 'get_ui' });
    const src = b64urlToText(ui_b64);
    const url = URL.createObjectURL(new Blob([src], { type: 'text/javascript' }));
    const mod = await import(url);
    URL.revokeObjectURL(url);

    setStatus('connected', 'ok');
    // The UI handle: `subscribe` (the read stream) + `send` (fire-and-forget owner
    // writes). It deliberately does NOT expose `request` (send→recv), so the UI can't
    // race a reply-awaiting call against its own subscription's recv loop — that
    // footgun stays gone by construction. `send` is reply-free, so it composes safely
    // with an active subscription.
    await mod.default({
      subscribe: (kind, cb) => conn.subscribe(kind, cb),
      send: (obj) => conn.sendOnly(obj),
    }, $('app'));
  } catch (e) {
    setStatus(`error: ${e && e.message ? e.message : e}`, 'err');
  }
}

$('connect').addEventListener('click', () => start($('token').value));
$('reenter').addEventListener('click', () => {
  $('token').value = '';
  showSavedState(false);
  $('token').focus();
});
$('forget').addEventListener('click', () => {
  localStorage.removeItem(KEY);
  location.reload();
});

// Make the page installable (Add to Home Screen / app list on Firefox-Android,
// which requires a registered SW with a fetch handler). Failure is non-fatal.
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Auto-reconnect with a saved token — WITHOUT ever rendering the token (the input
// stays empty/hidden; the saved-state row shows instead).
const saved = localStorage.getItem(KEY);
if (saved) { showSavedState(true); start(saved); }
else { showSavedState(false); }
</script>
</body>
</html>
